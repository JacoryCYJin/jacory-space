<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Jacory Space - Personal Operating System</title>
  <desc id="desc">A cool white editorial archive cover for the Jacory Space README.</desc>
  <rect width="1200" height="560" fill="#F6F8FA"/>
  <filter id="grain" x="0" y="0" width="1200" height="560" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
    <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="2" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncA type="table" tableValues="0 0.035"/>
    </feComponentTransfer>
  </filter>
  <rect width="1200" height="560" filter="url(#grain)" opacity="0.55"/>

  <g font-family="Geist Mono, SFMono-Regular, Consolas, monospace" font-size="12" letter-spacing="2">
    <text x="72" y="72" fill="#0E66C8">FIG. 00 - README INDEX</text>
    <text x="980" y="72" fill="#73787F">MMXXVI / 01</text>
  </g>

  <g>
    <rect x="72" y="116" width="474" height="320" fill="#FAFBFC" stroke="#DCDFE3"/>
    <rect x="72" y="116" width="474" height="42" fill="#F6F8FA" stroke="#DCDFE3"/>
    <circle cx="96" cy="137" r="4" fill="#0E66C8"/>
    <circle cx="112" cy="137" r="4" fill="#C4C9CE"/>
    <circle cx="128" cy="137" r="4" fill="#DCDFE3"/>
    <text x="386" y="141" fill="#73787F" font-family="Geist Mono, SFMono-Regular, Consolas, monospace" font-size="10" letter-spacing="1.6">JACORY.SPACE</text>

    <line x1="112" y1="190" x2="506" y2="190" stroke="#DCDFE3"/>
    <line x1="112" y1="246" x2="506" y2="246" stroke="#DCDFE3"/>
    <line x1="112" y1="302" x2="506" y2="302" stroke="#DCDFE3"/>
    <line x1="112" y1="358" x2="506" y2="358" stroke="#DCDFE3"/>
    <line x1="191" y1="158" x2="191" y2="436" stroke="#DCDFE3" stroke-opacity="0.6"/>
    <line x1="270" y1="158" x2="270" y2="436" stroke="#DCDFE3" stroke-opacity="0.5"/>
    <line x1="349" y1="158" x2="349" y2="436" stroke="#DCDFE3" stroke-opacity="0.5"/>
    <line x1="428" y1="158" x2="428" y2="436" stroke="#DCDFE3" stroke-opacity="0.5"/>

    <g font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" fill="#1D2127">
      <text x="112" y="238" font-size="58" font-weight="520" letter-spacing="-3">Personal</text>
      <text x="112" y="294" font-size="58" font-weight="520" letter-spacing="-3">operating</text>
      <text x="112" y="350" font-size="58" font-style="italic" font-weight="520" letter-spacing="-3">system</text>
    </g>
    <text x="365" y="296" fill="#0E66C8" font-family="Geist Mono, SFMono-Regular, Consolas, monospace" font-size="22">/os</text>
    <circle cx="116" cy="396" r="4" fill="#0E66C8"/>
    <text x="136" y="401" fill="#73787F" font-family="Geist Mono, SFMono-Regular, Consolas, monospace" font-size="11" letter-spacing="1.8">TOOLS . NOTES . WORKFLOWS</text>
  </g>

  <g font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif">
    <text x="612" y="198" fill="#1D2127" font-size="72" font-weight="560" letter-spacing="-4">Jacory</text>
    <text x="612" y="272" fill="#1D2127" font-size="72" font-style="italic" font-weight="520" letter-spacing="-4">Space</text>
  </g>

  <g font-family="Geist Mono, SFMono-Regular, Consolas, monospace" font-size="12" letter-spacing="1.8">
    <text x="616" y="324" fill="#0E66C8">PERSONAL OS / DIGITAL ARCHIVE / FIELD NOTES</text>
    <line x1="616" y1="352" x2="1092" y2="352" stroke="#DCDFE3"/>
    <text x="616" y="390" fill="#1D2127">01 / TOOLS</text>
    <text x="816" y="390" fill="#73787F">SELF-BUILT UTILITIES</text>
    <line x1="616" y1="410" x2="1092" y2="410" stroke="#DCDFE3"/>
    <text x="616" y="448" fill="#1D2127">02 / FIELD NOTES</text>
    <text x="816" y="448" fill="#73787F">WRITING AND METHODS</text>
    <line x1="616" y1="468" x2="1092" y2="468" stroke="#DCDFE3"/>
  </g>
</svg>
